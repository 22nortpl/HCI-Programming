<h3>switch 문으로 커피 주문</h3>
<hr>
<script>
  let price = 0;
  let text = "espresso , 에스프레소 : 2000원\n카푸치노 : 3000원\
  \n카페라떼 : 3500원\n";
  let coffee = prompt(text + "무슨 커피 드릴까요?", "");
  switch(coffee) {
    case "espresso" :
    case "에스프레소" : price = 2000;
      break;
    case "카푸치노" : price = 3000;
      break;
    case "카페라떼" : price = 3500;
      break;
    default :
      document.write(coffee + "는 없습니다.");
  }
  if(price != 0)
    document.write(coffee + "는 " + price + "원입니다.");
  document.write("<hr>");
  for(let size=10; size<=35; size+=5) { // 5씩 증가
    document.write("<span ");
    document.write("style='font-size:" + size + "px'>");
    document.write(size + "px");
    document.write("</span>");
  }
</script>
<script>
let orgSpan = null;
function change() {
	let span = document.getElementById("mySpan"); // id가 mySpan인 객체 찾기
	if (orgSpan == null){
    orgSpan = span.getAttribute('style');
  }
  span.style.color = "green"; // 글자 색 green
	span.style.fontSize = "30px"; // 글자 크기는 30픽셀
	span.style.display = "block"; // 블록 박스로 변경
	span.style.width = "6em"; // 박스의 폭. 6 글자 크기
	span.style.border = "3px dotted magenta"; // 3픽셀 점선 magenta 테두리
	span.style.margin = "20px"; // 상하좌우 여백 20px
}
function goback(){
  let span = document.getElementById("mySpan"); // id가 mySpan인 객체 찾기
	if (orgSpan != null){
    span.setAttribute('style', orgSpan);
  }
}
</script>
<h3>CSS 스타일 동적 변경</h3>
<hr>
<p style="color:blue" >이것은 
    <span id="mySpan" style="color:red">문장입니다.	</span>
</p>
<input type="button" value="스타일변경" onclick="change()">
<input type="button" value="스타일되돌리기" onclick="goback()">
<h3>z-index 프로퍼티</h3>
<hr>
<div class="cards">

<img id="spade7" src="spade-7.png" width="100" height="140" alt="스페이드7">
</div>
<br>
<script>
    let clicked = 1;
    function change() {
      let spadeA = document.getElementById("spadeA"); 
      if (clicked <= 7)
        clicked++;
      else clicked = 1;
            
            spadeA.style.zIndex = clicked;
            let text = clicked*10 + "px";
            spadeA.style.top = text;
            spadeA.style.left = text; 
        }
</script>

  <input type="button" value="spacd-A z-index 변경" onclick="change()">
